{{- if .Values.udpGatewayBridge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chirpstack.fullname" . }}-gateway-bridge
  labels:
    app: gateway-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-bridge
  template:
    metadata:
      labels:
        app: gateway-bridge
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway-bridge-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: gateway-bridge
          image: "{{ .Values.udpGatewayBridge.image.repository }}:{{ .Values.udpGatewayBridge.image.tag }}"
          imagePullPolicy: {{ .Values.udpGatewayBridge.image.pullPolicy }}
          args: ["-c", "/etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml"]
          ports:
            - name: udp-fwd
              containerPort: {{ .Values.udpGatewayBridge.udpPort }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/chirpstack-gateway-bridge
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi

      volumes:
        - name: config
          configMap:
            name: {{ include "chirpstack.fullname" . }}-gateway-bridge

{{- end }}
